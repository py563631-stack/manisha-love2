<!DOCTYPE html>
<html>
<head>
  <title>For Manisha ❤️</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 50px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }

    #yes {
      background: white;
      color: #ff4d6d;
    }

    #no {
      background: black;
      color: white;
      position: absolute;
    }

    .heart {
      position: absolute;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

    .teddy {
      position: absolute;
      bottom: 0;
      width: 150px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<h1>Hey Manisha ❤️</h1>
<p>You are my happiness 😌</p>
<h2>Will you be mine forever? 💖</h2>

<button id="yes" onclick="yesClicked()">Yes 💘</button>
<button id="no" onclick="noClicked()">No 😜</button>

<!-- Teddy image -->
<img class="teddy" src="https://i.imgur.com/6X4QZ5M.png">

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
let messages = [
  "No 😒",
  "Are you sure? 😢",
  "Please Manisha 💔",
  "Ek baar soch lo 😭",
  "Please maan jao 🙏",
  "Mat bolo na 😭💘",
  "Last chance 😢",
  "Pakka No? 🥺"
];

let index = 0;

function yesClicked() {
  alert("Yay ❤️ I love you Manisha 😍💖 Forever!");
}

function noClicked() {
  let btn = document.getElementById("no");
  
  btn.innerText = messages[index];
  index = (index + 1) % messages.length;

  // Move button randomly
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// hearts animation
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
